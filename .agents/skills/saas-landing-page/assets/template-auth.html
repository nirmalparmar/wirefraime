<!--
  DIRECTION C — Split-screen auth (sign up / log in). A mesh-gradient brand
  panel beside a clean form. Re-skin the gradient + accent + copy. Pair with
  any direction's brand. See references/sections.md > Auth.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BrightNest — Create an account</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#16181d; --ink-soft:#8a8f99; --line:#e8e9ec;
    --page-bg:#e6e7e9; --card-bg:#fff;
    --accent:#f0641e;             /* brand accent (links, mark) */
    --cta:#15171c; --cta-press:#000;
    /* mesh panel stops */
    --m1:#ffd9a8; --m2:#ff7a3c; --m3:#ffb27a; --m-base:#ffe9d6;
    --sans:"Inter",system-ui,sans-serif;
    --radius:22px;
    --shadow-card:0 40px 80px -34px rgba(20,24,33,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--page-bg);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:30px;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .auth{width:min(960px,100%);background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow-card);display:grid;grid-template-columns:1fr 1fr;overflow:hidden;padding:14px;gap:0}

  /* left brand panel */
  .panel{border-radius:16px;padding:30px;min-height:440px;display:flex;flex-direction:column;justify-content:space-between;color:var(--ink);
    background:
      radial-gradient(60% 50% at 70% 35%,var(--m2) 0,transparent 60%),
      radial-gradient(70% 60% at 30% 60%,var(--m1) 0,transparent 65%),
      radial-gradient(50% 50% at 80% 80%,var(--m3) 0,transparent 60%),
      var(--m-base);}
  .panel .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:18px}
  .panel .brand .mark{width:24px;height:24px;border-radius:7px;background:#15171c;display:grid;place-content:center;color:#fff;font-size:13px}
  .panel .pitch small{font-size:14px;opacity:.7;font-weight:500}
  .panel .pitch h2{font-size:26px;font-weight:700;line-height:1.2;margin-top:8px;max-width:16ch}

  /* right form */
  .form{padding:42px 48px;display:flex;flex-direction:column;justify-content:center}
  .spark{color:var(--accent);font-size:28px;line-height:1}
  .form h1{font-size:30px;font-weight:700;margin:14px 0 8px}
  .form .lead{color:var(--ink-soft);font-size:14px;line-height:1.5;margin-bottom:26px;max-width:34ch}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 7px}
  .field{display:flex;align-items:center;border:1px solid var(--line);border-radius:10px;padding:0 14px}
  .field input{border:none;outline:none;font-family:inherit;font-size:14px;padding:13px 0;width:100%;background:transparent}
  .field input::placeholder{color:#b6bac1}
  .field .eye{color:var(--ink-soft);cursor:pointer;font-size:15px}
  .submit{margin-top:24px;background:var(--cta);color:#fff;border:none;border-radius:10px;padding:15px;font-family:inherit;font-weight:600;font-size:15px;cursor:pointer;box-shadow:0 16px 30px -14px rgba(20,24,33,.55);transition:background .15s}
  .submit:hover{background:var(--cta-press)}
  .or{display:flex;align-items:center;gap:14px;color:var(--ink-soft);font-size:13px;margin:22px 0}
  .or::before,.or::after{content:"";flex:1;height:1px;background:var(--line)}
  .socials{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .socials button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:12px;font-size:18px;cursor:pointer;transition:border-color .15s}
  .socials button:hover{border-color:#c9ccd2}
  .foot{text-align:center;margin-top:24px;font-size:13px;color:var(--ink-soft)}
  .foot a{color:var(--accent);font-weight:600}

  @media(max-width:720px){.auth{grid-template-columns:1fr}.panel{display:none}.form{padding:32px}}
</style>
</head>
<body>
  <div class="auth">
    <div class="panel">
      <div class="brand"><span class="mark">◣</span>BrightNest</div>
      <div class="pitch">
        <small>You can easily</small>
        <h2>Get access to your personal hub for clarity and productivity.</h2>
      </div>
    </div>

    <div class="form">
      <div class="spark">✳</div>
      <h1>Create an account</h1>
      <p class="lead">Access your tasks, notes, and projects anytime, anywhere — and keep everything flowing in one place.</p>

      <label>Your email</label>
      <div class="field"><input type="email" placeholder="natalia.brak@knmstudio.com" /></div>

      <label>Create password</label>
      <div class="field"><input type="password" placeholder="••••••••••••" /><span class="eye">👁</span></div>

      <button class="submit">Create account</button>

      <div class="or">or continue with</div>
      <div class="socials">
        <button aria-label="Google"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.9a5 5 0 0 1-2.2 3.3v2.7h3.5c2-1.9 3.3-4.7 3.3-7.8z"/><path fill="#34A853" d="M12 23c3 0 5.5-1 7.3-2.7l-3.5-2.7c-1 .7-2.3 1.1-3.8 1.1-2.9 0-5.3-1.9-6.2-4.6H2.2v2.8A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.8 14.1a6.6 6.6 0 0 1 0-4.2V7.1H2.2a11 11 0 0 0 0 9.8z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3 .6 4.2 1.7l3.1-3.1A11 11 0 0 0 2.2 7.1l3.6 2.8C6.7 7.3 9.1 5.4 12 5.4z"/></svg></button>
        <button aria-label="GitHub"><svg width="18" height="18" viewBox="0 0 24 24" fill="#16181d"><path d="M12 2a10 10 0 0 0-3.2 19.5c.5.1.7-.2.7-.5v-1.7c-2.8.6-3.4-1.3-3.4-1.3-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.6 2.4 1.1 3 .9.1-.7.3-1.1.6-1.4-2.2-.300-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.4-1.3.1-2.7 0 0 .8-.3 2.7 1a9.4 9.4 0 0 1 5 0c1.9-1.3 2.7-1 2.7-1 .5 1.4.2 2.4.1 2.7.6.7 1 1.6 1 2.7 0 3.9-2.4 4.7-4.6 5 .3.3.7 1 .7 2v3c0 .3.2.6.7.5A10 10 0 0 0 12 2z"/></svg></button>
        <button aria-label="Apple"><svg width="18" height="18" viewBox="0 0 24 24" fill="#16181d"><path d="M16 12.5c0-2.1 1.7-3.1 1.8-3.2-1-1.4-2.5-1.6-3-1.7-1.3-.1-2.5.8-3.2.8-.6 0-1.7-.7-2.8-.7-1.4 0-2.7.8-3.5 2.1-1.5 2.6-.4 6.4 1 8.5.7 1 1.5 2.2 2.6 2.1 1-.04 1.4-.7 2.7-.7 1.2 0 1.6.7 2.7.6 1.1 0 1.8-1 2.5-2 .8-1.2 1.1-2.3 1.1-2.4-.1 0-2.2-.8-2.2-3.3zM14 6.3c.6-.7 1-1.7.9-2.7-.8 0-1.9.6-2.5 1.3-.5.6-1 1.6-.9 2.6.9.1 1.8-.5 2.5-1.2z"/></svg></button>
      </div>

      <p class="foot">Already have an account? <a href="#">Register</a></p>
    </div>
  </div>
</body>
</html>
