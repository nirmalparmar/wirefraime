<!--
  DIRECTION B — "Aurora" (mesh gradient + serif). Consumer/app hero.
  Soft aurora background, serif display, glassy pill eyebrow, phone-mockup
  centerpiece with floating circular icons, black pill CTA. Re-skin the
  gradient stops + accent + copy. See references/effects.md for the recipes.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kenko — Your personal trainer, anywhere</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --serif:"Playfair Display",Georgia,serif;
    --sans:"Inter",system-ui,sans-serif;
    --ink:#1c1b1a; --ink-soft:#6b6864;
    --page-bg:#e4e4e6; --card-bg:#fff;
    --cta:#1c1b1a; --cta-press:#000;
    /* aurora stops — re-skin these for a new mood */
    --a1:#ffd0e7; --a2:#ffe2bd; --a3:#e3d6ff; --a4:#ffe9d6; --a-base:#fff6f0;
    --radius-card:26px;
    --shadow-card:0 40px 80px -34px rgba(28,27,26,.30);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--page-bg);color:var(--ink);padding:26px;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .shell{
    border-radius:var(--radius-card);box-shadow:var(--shadow-card);overflow:hidden;
    background:
      radial-gradient(60% 50% at 18% 28%,var(--a1) 0,transparent 60%),
      radial-gradient(55% 45% at 85% 18%,var(--a2) 0,transparent 60%),
      radial-gradient(60% 55% at 75% 75%,var(--a3) 0,transparent 60%),
      radial-gradient(50% 50% at 25% 85%,var(--a4) 0,transparent 60%),
      var(--a-base);
  }
  nav{display:flex;align-items:center;justify-content:space-between;padding:24px 34px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:20px}
  .brand .mark{width:22px;height:22px;border-radius:7px;background:var(--ink);display:grid;place-content:center;color:#fff;font-size:12px}
  .nav-links{display:flex;gap:30px}
  .nav-links a{font-size:15px;color:var(--ink-soft)}
  .nav-links a.active{color:var(--ink);font-weight:600;border-bottom:2px solid var(--ink);padding-bottom:3px}
  .btn-dark{background:var(--cta);color:#fff;border:none;border-radius:999px;padding:11px 22px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:background .15s}
  .btn-dark:hover{background:var(--cta-press)}

  .hero{text-align:center;padding:40px 24px 70px;display:flex;flex-direction:column;align-items:center}
  .pill{background:rgba(255,255,255,.7);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.8);border-radius:999px;padding:9px 18px;font-size:13px;font-weight:500;color:var(--ink-soft);box-shadow:0 6px 18px -8px rgba(28,27,26,.25)}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(40px,6.5vw,78px);line-height:1.04;letter-spacing:-.01em;margin:26px 0 0;max-width:14ch}
  .subtitle{margin-top:20px;color:var(--ink-soft);font-size:17px;line-height:1.5;max-width:30ch}
  .signup{margin-top:28px;display:flex;align-items:center;gap:8px;background:#fff;border-radius:999px;padding:7px 7px 7px 22px;box-shadow:0 14px 30px -14px rgba(28,27,26,.3)}
  .signup input{border:none;outline:none;font-family:inherit;font-size:15px;width:200px;background:transparent;color:var(--ink)}
  .signup input::placeholder{color:#b3afaa}

  /* phone mockup */
  .phone-wrap{position:relative;margin-top:54px}
  .phone{width:300px;height:430px;border-radius:42px;background:#fff;border:9px solid #111;box-shadow:0 40px 70px -30px rgba(28,27,26,.45);overflow:hidden;position:relative;
    background-image:
      radial-gradient(70% 50% at 50% 100%,var(--a1) 0,transparent 70%),
      radial-gradient(60% 40% at 80% 90%,var(--a2) 0,transparent 70%),
      linear-gradient(#fff,#fff);}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:110px;height:24px;background:#111;border-radius:0 0 16px 16px;z-index:3}
  .statusbar{display:flex;justify-content:space-between;padding:14px 22px 0;font-size:12px;font-weight:600}
  .phone-head{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px;font-size:14px;font-weight:600}
  .week{display:flex;justify-content:center;gap:14px;margin-top:18px}
  .week i{width:9px;height:9px;border-radius:50%;border:2px solid #d9b38a;display:block}
  .phone-quote{font-family:var(--serif);text-align:center;font-size:19px;margin-top:30px;padding:0 26px;line-height:1.3}
  .ring{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px}
  .dot{width:46px;height:46px;border-radius:50%;display:grid;place-content:center;font-size:18px;background:#fff;box-shadow:0 8px 16px -6px rgba(0,0,0,.3)}
  .dot.lg{width:74px;height:74px;font-size:26px;color:#fff;background:radial-gradient(circle at 35% 30%,#ff7ac0,#d63b9e);box-shadow:0 12px 24px -8px rgba(214,59,158,.6)}
  .dot.c1{background:radial-gradient(circle at 35% 30%,#7fd3ff,#2da7ff);color:#fff}
  .dot.c2{background:radial-gradient(circle at 35% 30%,#8be8a8,#37c46b);color:#fff}
  .dot.c3{background:radial-gradient(circle at 35% 30%,#ffd98a,#ffab3d);color:#fff}
  .dot.c4{background:radial-gradient(circle at 35% 30%,#cdbdfc,#8b6df0);color:#fff}
  .ring .label{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);text-align:center;font-size:11px;width:80px}
  .ring .label b{display:block;font-size:13px}

  @media(max-width:720px){.nav-links{display:none}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="shell">
    <nav>
      <div class="brand"><span class="mark">✦</span>Kenko</div>
      <div class="nav-links"><a href="#" class="active">Home</a><a href="#">Features</a><a href="#">Insights</a></div>
      <button class="btn-dark">Download Now</button>
    </nav>

    <section class="hero">
      <span class="pill">Heyo! Fitness alpha launched!</span>
      <h1>Your personal trainer, anywhere</h1>
      <p class="subtitle">No matter where you are in the world, we've got your fitness goals covered.</p>
      <div class="signup">
        <input type="email" placeholder="Enter your e-mail" />
        <button class="btn-dark">Sign up</button>
      </div>

      <div class="phone-wrap">
        <div class="phone">
          <div class="notch"></div>
          <div class="statusbar"><span>9:41</span><span>📶 🔋</span></div>
          <div class="phone-head">Thursday, 28 Jul</div>
          <div class="week"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
          <p class="phone-quote">You've formed and stopped tracking.</p>
          <div class="ring">
            <div class="dot c1">⚡</div>
            <div class="dot lg">🔥<span class="label"><b>Protein</b>208G</span></div>
            <div class="dot c2">🍃</div>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
